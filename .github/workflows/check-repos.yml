name: Check for coding standard violations
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.repos.outputs.repos }}
    steps:
      - uses: actions/checkout@v6
      - id: repos
        run: echo "repos=$(cat .github/repos.json | jq -c)" >> $GITHUB_OUTPUT
  check-repos-and-create-pr:
    needs: setup
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    name: Check imbo/${{ matrix.repo }}
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.repos) }}
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.IMBO_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.IMBO_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6
        with:
          repository: imbo/${{ matrix.repo }}
          ref: refs/heads/main
          token: ${{ steps.app-token.outputs.token }}
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - run: composer install
      - run: composer require --dev imbo/imbo-coding-standard ${{ env.TAG }}
      - id: check
        run: |
          if ! vendor/bin/php-cs-fixer check --quiet; then
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      - if: ${{ steps.check.outputs.result == 'failure' }}
        run: vendor/bin/php-cs-fixer fix
      - if: ${{ steps.check.outputs.result == 'failure' }}
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: coding-standard-violations
          delete-branch: true
          commit-message: |
            fix: coding standard violations (imbo/imbo-coding-standard@${{ env.TAG }})

            Automated fix for coding standard violations detected by
            imbo/imbo-coding-standard@${{ env.TAG }}.

            This commit was generated by the Imbo Automation bot to ensure repositories
            stay compliant with the coding standards.
          title: |
            fix: coding standard violations (imbo/imbo-coding-standard@${{ env.TAG }})
          body: |
            Automated fix for coding standard violations detected by
            imbo/imbo-coding-standard@${{ env.TAG }}.

            This commit was generated by the Imbo Automation bot to ensure repositories
            stay compliant with the coding standards.
          author: Imbo Automation <imbo-automation@users.noreply.github.com>
          committer: Imbo Automation <imbo-automation@users.noreply.github.com>
      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.result }}" != "failure" ]; then
            echo ":white_check_mark: **imbo/${{ matrix.repo }}** — No violations." >> $GITHUB_STEP_SUMMARY
          elif [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo ":hammer_and_wrench: **imbo/${{ matrix.repo }}** — PR created: ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: **imbo/${{ matrix.repo }}** — Violations found but PR already exists." >> $GITHUB_STEP_SUMMARY
          fi
