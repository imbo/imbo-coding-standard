name: Preview coding standard changes
on:
  pull_request:
    branches:
      - main
concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.repos.outputs.repos }}
    steps:
      - uses: actions/checkout@v6
      - id: repos
        run: echo "repos=$(cat .github/repos.json | jq -c)" >> $GITHUB_OUTPUT
  preview-diff:
    needs: setup
    runs-on: ubuntu-latest
    name: imbo/${{ matrix.repo }}
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.repos) }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: coding-standard
      - uses: actions/checkout@v6
        with:
          repository: imbo/${{ matrix.repo }}
          ref: refs/heads/main
          path: target-repo
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Install dependencies and coding standard from PR
        working-directory: target-repo
        run: |
          composer install
          composer config repositories.local '{"type": "path", "url": "../coding-standard", "options": {"symlink": false}}'
          composer require --dev imbo/imbo-coding-standard:@dev
      - name: Generate diff
        working-directory: target-repo
        run: |
          vendor/bin/php-cs-fixer fix --quiet || true
          git diff -- . ':!composer.json' ':!composer.lock' > /tmp/diff.patch
      - uses: actions/upload-artifact@v4
        with:
          name: diff-${{ matrix.repo }}
          path: /tmp/diff.patch
          retention-days: 1
  comment:
    needs: [setup, preview-diff]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.IMBO_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.IMBO_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/download-artifact@v4
        with:
          path: diffs
      - name: Build comment body
        run: |
          {
            echo "<!-- preview-diff -->"
            echo "## Coding standard diff preview"
            echo ""

            REPOS='${{ needs.setup.outputs.repos }}'
            for REPO in $(echo "$REPOS" | jq -r '.[]'); do
              DIFF_FILE="diffs/diff-${REPO}/diff.patch"
              if [ -s "$DIFF_FILE" ]; then
                echo "<details>"
                echo "<summary>:warning: imbo/${REPO}</summary>"
                echo ""
                echo '```diff'
                head -500 "$DIFF_FILE"
                echo '```'
                TOTAL=$(wc -l < "$DIFF_FILE")
                if [ "$TOTAL" -gt 500 ]; then
                  echo ""
                  echo "_Diff truncated (showing 500 of ${TOTAL} lines)._"
                fi
                echo ""
                echo "</details>"
              else
                echo ":white_check_mark: **imbo/${REPO}** — No changes."
              fi
              echo ""
            done
          } > /tmp/comment.md
      - uses: peter-evans/find-comment@v3
        id: existing-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- preview-diff -->"
          token: ${{ steps.app-token.outputs.token }}
      - uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.existing-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/comment.md
          edit-mode: replace
          token: ${{ steps.app-token.outputs.token }}
